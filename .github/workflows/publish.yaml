name: Deploy al-folio website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          python3 -m pip install --user --upgrade jupyter

      - name: Download al-folio
        run: |
          curl -L https://codeload.github.com/alshedivat/al-folio/zip/refs/heads/master -o al-folio.zip
          unzip -q al-folio.zip
          mv al-folio-master site

      - name: Apply site content
        run: |
          rm -rf site/_pages site/_bibliography site/_news site/_projects site/_posts
          mkdir -p site/_posts site/assets/img site/assets/pdf
          cp -R _pages site/_pages
          cp -R _bibliography site/_bibliography
          cp -R _news site/_news
          cp -R _projects site/_projects
          if [ -f assets/img/prof_pic.jpeg ]; then cp assets/img/prof_pic.jpeg site/assets/img/prof_pic.jpeg; fi
          if [ -f assets/pdf/resume.pdf ]; then cp assets/pdf/resume.pdf site/assets/pdf/resume.pdf; fi
          ruby -ryaml -rdate -e '
            def load_yaml(path)
              if YAML.respond_to?(:unsafe_load_file)
                YAML.unsafe_load_file(path)
              else
                YAML.load_file(path)
              end
            end
            def deep_merge(base, override)
              override.each do |key, value|
                if base[key].is_a?(Hash) && value.is_a?(Hash)
                  deep_merge(base[key], value)
                else
                  base[key] = value
                end
              end
              base
            end
            base = load_yaml("site/_config.yml")
            override = load_yaml("_config.yml")
            File.write("site/_config.yml", deep_merge(base, override).to_yaml)
          '

      - name: Patch theme
        run: |
          sed -i 's/ctrl k <i/\<i/g' site/_includes/header.liquid
          python3 - << 'PYEOF'
import re
with open('site/_layouts/bib.liquid', 'r') as f:
    content = f.read()
old = '        {%- if author_is_self -%}\n          <em>\n            {{- author.first }}\n            {{ author_last_html -}}\n          </em>'
new = '        {%- if author_is_self -%}\n          <em><strong>{{- author.first }} {{ author_last_html -}}</strong></em>{%- if entry.corresponding == "true" %} <sup title="Corresponding Author" style="color:#b03a2e;"><i class="fas fa-envelope"></i></sup>{%- endif %}'
result = content.replace(old, new)
if result == content:
    print('WARNING: pattern not found in bib.liquid, trying regex fallback')
    result = re.sub(
        r'(\{%-\s*if author_is_self\s*-%\}\s*)<em>(.*?)</em>',
        r'\1<em><strong>\2</strong></em>{%- if entry.corresponding == "true" %} <sup title="Corresponding Author" style="color:#b03a2e;"><i class="fas fa-envelope"></i></sup>{%- endif %}',
        result, flags=re.DOTALL
    )
with open('site/_layouts/bib.liquid', 'w') as f:
    f.write(result)
print('bib.liquid patched successfully')
PYEOF

      - name: Build site
        run: |
          cd site
          bundle install
          export JEKYLL_ENV=production
          bundle exec jekyll build --destination ../_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
