name: Deploy al-folio website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: false

      - name: Download al-folio
        run: |
          curl -L https://codeload.github.com/alshedivat/al-folio/zip/refs/heads/master -o al-folio.zip
          unzip -q al-folio.zip
          mv al-folio-master site

      - name: Apply site content
        run: |
          rm -rf site/_pages site/_bibliography site/_news site/_projects site/_posts
          mkdir -p site/_posts
          cp -R _pages site/_pages
          cp -R _bibliography site/_bibliography
          cp -R _news site/_news
          cp -R _projects site/_projects
          ruby -ryaml -e '
            def deep_merge(base, override)
              override.each do |key, value|
                if base[key].is_a?(Hash) && value.is_a?(Hash)
                  deep_merge(base[key], value)
                else
                  base[key] = value
                end
              end
              base
            end
            base = YAML.load_file("site/_config.yml")
            override = YAML.load_file("_config.yml")
            File.write("site/_config.yml", deep_merge(base, override).to_yaml)
          '

      - name: Build site
        run: |
          cd site
          bundle install
          export JEKYLL_ENV=production
          bundle exec jekyll build --destination ../_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
